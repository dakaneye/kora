version: 2

builds:
  - main: ./cmd/kora
    binary: kora
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - arm64
      - amd64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^Merge"

release:
  header: |
    ## Installation

    ```bash
    # macOS arm64
    curl -L https://github.com/dakaneye/kora/releases/download/{{ .Tag }}/kora_{{ .Version }}_darwin_arm64.tar.gz | tar xz
    sudo mv kora /usr/local/bin/

    # macOS amd64
    curl -L https://github.com/dakaneye/kora/releases/download/{{ .Tag }}/kora_{{ .Version }}_darwin_amd64.tar.gz | tar xz
    sudo mv kora /usr/local/bin/

    # Or from source
    go install github.com/dakaneye/kora/cmd/kora@{{ .Tag }}
    ```

    Requires [`gh`](https://cli.github.com/), [`gws`](https://github.com/googleworkspace/cli), and [`linear`](https://github.com/schpet/linear-cli) CLIs.
    See [README](https://github.com/dakaneye/kora#readme) for setup.
  footer: |
    **Full Changelog**: https://github.com/dakaneye/kora/compare/{{ .PreviousTag }}...{{ .Tag }}
