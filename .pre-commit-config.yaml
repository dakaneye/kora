repos:
  - repo: local
    hooks:
      - id: go-build
        name: go build
        entry: go build ./cmd/kora
        language: system
        pass_filenames: false
        types: [go]

      - id: go-test
        name: go test
        entry: go test -race ./internal/... ./cmd/kora/...
        language: system
        pass_filenames: false
        types: [go]

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run ./...
        language: system
        pass_filenames: false
        types: [go]

      - id: gosec
        name: gosec
        entry: gosec ./...
        language: system
        pass_filenames: false
        types: [go]

      - id: govulncheck
        name: govulncheck
        entry: govulncheck ./...
        language: system
        pass_filenames: false
        types: [go]
